    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f6f9;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: #1e293b;
        }

        .logo {
            color: white;

            font-weight: bold;
        }

        nav a {
            color: white;

        }

            display: flex;

        button {
            padding: 10px 20px;

        }

        button:hover {
